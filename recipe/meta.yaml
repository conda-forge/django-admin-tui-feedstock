{% set name = "django-admin-tui" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django_admin_tui-{{ version }}.tar.gz
  sha256: f596debb160b94fab2108a664d3b799137844a384cc0a61a44fdd3ddd6e6a44c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - django >=4.2
    - textual >=0.79

test:
  imports:
    - django_admin_tui
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/valberg/django-admin-tui
  summary: Django Admin in the terminal.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - thewchan
